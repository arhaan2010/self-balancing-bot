# Pixhawk Configuration for Self-Balancing Bot

# Connection Settings
connection:
  # Type: 'serial' for USB connection, 'udp' for network, 'tcp' for telemetry
  type: 'serial'
  
  # Serial connection parameters
  serial:
    port: '/dev/ttyACM0'  # USB port (check with 'ls /dev/ttyACM*')
    baudrate: 115200       # Standard Pixhawk baud rate
    
  # UDP connection (if using network)
  udp:
    address: '127.0.0.1'
    port: 14550
    
  # TCP connection (if using telemetry)
  tcp:
    address: '127.0.0.1'
    port: 5760

# Timeout Settings
timeout:
  heartbeat: 5.0          # Seconds to wait for heartbeat
  data_read: 1.0          # Timeout for data reads

# IMU Configuration
imu:
  # Update rate for IMU data (Hz)
  update_rate: 100
  
  # Calibration offsets (set during calibration)
  calibration:
    pitch_offset: 0.0     # Degrees
    roll_offset: 0.0      # Degrees
    accel_offset_x: 0.0   # m/s²
    accel_offset_y: 0.0   # m/s²
    accel_offset_z: 0.0   # m/s²

# Attitude Message Configuration
attitude:
  # Subscribe to ATTITUDE message for real-time orientation
  enabled: true
  
  # Smoothing filter (0.0 = no smoothing, 0.5 = heavy smoothing)
  smoothing_factor: 0.1

# Sensor Limits
sensor_limits:
  # Max pitch angle before failsafe (degrees)
  max_pitch: 45.0
  
  # Max roll angle before failsafe (degrees)
  max_roll: 45.0
  
  # Max angular velocity before failsafe (degrees/second)
  max_angular_velocity: 300.0

# Safety Parameters
safety:
  # Enable failsafe if connection lost
  enable_failsafe: true
  
  # Failsafe action: 'disarm', 'land', 'hold'
  failsafe_action: 'disarm'
  
  # Time without data before failsafe triggers (seconds)
  failsafe_timeout: 2.0

# Logging
logging:
  enabled: true
  log_file: 'logs/pixhawk.log'
  log_level: 'INFO'        # DEBUG, INFO, WARNING, ERROR
